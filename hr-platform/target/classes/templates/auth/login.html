<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Connexion - RH Plateforme</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="login-body">
<main class="login-shell">
    <section class="login-card">
        <div class="login-panel">
            <div class="login-logo"><i class="bi bi-grid-1x2-fill"></i></div>
            <h1>RH Plateforme</h1>
            <p>Centralisez les employes, conges, demandes administratives, documents et notifications dans un seul espace securise.</p>
        </div>
        <div class="login-form-panel">
            <div class="mb-4">
                <span class="login-kicker">Bienvenue</span>
                <h2>Connexion</h2>
                <p class="text-muted mb-0">Accedez a votre espace de gestion RH.</p>
            </div>

            <div th:if="${param.error}" class="alert alert-danger">
                Login ou mot de passe incorrect.
            </div>
            <div th:if="${param.logout}" class="alert alert-success">
                Vous avez ete deconnecte avec succes.
            </div>

            <form th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="mb-3">
                    <label for="login" class="form-label">Login</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" id="login" name="login" class="form-control" placeholder="admin" autocomplete="username" required autofocus>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="motDePasse" class="form-label">Mot de passe</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" id="motDePasse" name="motDePasse" class="form-control" placeholder="********" autocomplete="current-password" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-accent w-100">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
                </button>
            </form>
        </div>
    </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
