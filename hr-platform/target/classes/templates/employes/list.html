<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout('Employes', ~{::section})}">
<body>
<section>
    <div class="panel">
        <div class="panel-header">
            <div>
                <h3>Liste des employes</h3>
                <p class="mb-0">Recherche, consultation et archivage des dossiers actifs ou historiques.</p>
            </div>
            <a th:href="@{/employes/nouveau}" class="btn btn-accent" sec:authorize="hasAnyRole('ADMIN','RESPONSABLE_RH')">
                <i class="bi bi-plus-lg me-2"></i>Nouvel employe
            </a>
        </div>

        <form th:action="@{/employes}" method="get" class="search-row">
            <div class="input-group" style="max-width: 420px;">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input type="search" class="form-control" name="search" th:value="${search}" placeholder="Nom, prenom, matricule, email...">
            </div>
            <button type="submit" class="btn btn-outline-primary">Rechercher</button>
            <a th:href="@{/employes}" class="btn btn-light">Reinitialiser</a>
        </form>

        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th>Matricule</th>
                    <th>Nom</th>
                    <th>Prenom</th>
                    <th>Departement</th>
                    <th>Poste</th>
                    <th>Statut</th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="employe : ${employes}">
                    <td class="fw-bold" th:text="${employe.matricule}">EMP-001</td>
                    <td th:text="${employe.nom}">Nom</td>
                    <td th:text="${employe.prenom}">Prenom</td>
                    <td th:text="${employe.departement != null ? employe.departement.libelle : '-'}">Departement</td>
                    <td th:text="${employe.poste != null ? employe.poste.libelle : '-'}">Poste</td>
                    <td>
                        <span th:if="${employe.actif}" class="badge text-bg-success">Actif</span>
                        <span th:unless="${employe.actif}" class="badge text-bg-secondary">Archive</span>
                    </td>
                    <td class="text-end">
                        <div class="d-inline-flex gap-1">
                            <a th:href="@{/employes/{id}(id=${employe.id})}" class="btn btn-sm btn-light btn-compact" title="Voir">
                                <i class="bi bi-eye"></i>
                            </a>
                            <a th:href="@{/employes/{id}/modifier(id=${employe.id})}" class="btn btn-sm btn-outline-primary btn-compact" title="Modifier" sec:authorize="hasAnyRole('ADMIN','RESPONSABLE_RH')">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:action="@{/employes/{id}/archiver(id=${employe.id})}" method="post" class="confirm-archive" sec:authorize="hasAnyRole('ADMIN','RESPONSABLE_RH')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="btn btn-sm btn-outline-danger btn-compact" title="Archiver" th:disabled="${!employe.actif}">
                                    <i class="bi bi-archive"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(employes)}">
                    <td colspan="7" class="empty-state">Aucun employe trouve.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
