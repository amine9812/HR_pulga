<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Nouvelle demande administrative', ~{::section})}">
<body>
<section>
    <div class="form-panel">
        <div class="panel-header">
            <div>
                <h3>Demande administrative</h3>
                <p class="mb-0">La demande sera transmise a l'equipe RH.</p>
            </div>
        </div>

        <form th:action="@{/demandes/soumettre}" th:object="${demandeAdministrative}" method="post" enctype="multipart/form-data" class="row g-3">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="col-md-5">
                <label class="form-label">Type de demande</label>
                <input type="text" class="form-control" th:field="*{typeDemande}" placeholder="Attestation de travail, bulletin..." required>
                <div class="text-danger small" th:if="${#fields.hasErrors('typeDemande')}" th:errors="*{typeDemande}"></div>
            </div>
            <div class="col-md-7 file-field">
                <label class="form-label">Piece jointe</label>
                <input type="file" name="pieceJointe" class="form-control">
                <div class="form-text selected-file">Aucun fichier selectionne</div>
            </div>
            <div class="col-12">
                <label class="form-label">Description</label>
                <textarea class="form-control" rows="5" th:field="*{description}" required></textarea>
                <div class="text-danger small" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
            </div>
            <div class="col-12 d-flex justify-content-end gap-2">
                <a th:href="@{/demandes}" class="btn btn-light">Annuler</a>
                <button type="submit" class="btn btn-accent">
                    <i class="bi bi-send me-2"></i>Soumettre
                </button>
            </div>
        </form>
    </div>
</section>
</body>
</html>
