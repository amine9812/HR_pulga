<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout('Demandes Admin', ~{::section})}">
<body>
<section>
    <div class="panel">
        <div class="panel-header">
            <div>
                <h3>Demandes administratives</h3>
                <p class="mb-0">Attestations, documents RH et reponses administratives.</p>
            </div>
            <a th:href="@{/demandes/nouvelle}" class="btn btn-accent">
                <i class="bi bi-plus-lg me-2"></i>Nouvelle demande
            </a>
        </div>

        <form th:action="@{/demandes}" method="get" class="filter-row">
            <select class="form-select" name="statut" style="max-width: 240px;">
                <option value="">Tous les statuts</option>
                <option th:each="statut : ${statuts}" th:value="${statut}" th:selected="${statutFiltre == statut}" th:text="${statut}">Statut</option>
            </select>
            <button type="submit" class="btn btn-outline-primary">Filtrer</button>
            <a th:href="@{/demandes}" class="btn btn-light">Reinitialiser</a>
        </form>

        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th>Employe</th>
                    <th>Type</th>
                    <th>Description</th>
                    <th>Statut</th>
                    <th>Reponse</th>
                    <th class="text-end">Traitement</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="demande : ${demandes}">
                    <td th:text="${demande.employe != null ? demande.employe.nomComplet : '-'}">Employe</td>
                    <td class="fw-bold" th:text="${demande.typeDemande}">Type</td>
                    <td th:text="${demande.description}">Description</td>
                    <td><span th:class="'status-badge status-' + ${demande.statut}" th:text="${demande.statut}">EN_ATTENTE</span></td>
                    <td th:text="${demande.reponse ?: '-'}">-</td>
                    <td class="text-end">
                        <form th:action="@{/demandes/{id}/traiter(id=${demande.id})}" method="post" class="d-flex flex-wrap justify-content-end gap-1"
                              sec:authorize="hasAnyRole('RESPONSABLE_RH','ADMIN')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <select name="statut" class="form-select form-select-sm" style="max-width: 150px;">
                                <option value="EN_COURS">EN_COURS</option>
                                <option value="VALIDEE">VALIDEE</option>
                                <option value="REFUSEE">REFUSEE</option>
                                <option value="CLOTUREE">CLOTUREE</option>
                            </select>
                            <input type="text" name="reponse" class="form-control form-control-sm" placeholder="Reponse" style="max-width: 220px;" required>
                            <button type="submit" class="btn btn-sm btn-accent btn-compact">
                                <i class="bi bi-check2-circle"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(demandes)}">
                    <td colspan="6" class="empty-state">Aucune demande administrative.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
