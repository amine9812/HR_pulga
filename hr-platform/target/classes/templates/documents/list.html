<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout('Documents', ~{::section})}">
<body>
<section>
    <div class="panel mb-4">
        <div class="panel-header">
            <div>
                <h3>Documents</h3>
                <p class="mb-0">Televersement, consultation et telechargement des fichiers RH.</p>
            </div>
            <button class="btn btn-accent" type="button" data-bs-toggle="collapse" data-bs-target="#uploadPanel">
                <i class="bi bi-upload me-2"></i>Televerser
            </button>
        </div>

        <div class="collapse" id="uploadPanel">
            <form th:action="@{/documents/televerser}" method="post" enctype="multipart/form-data" class="row g-3 pt-2">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="col-md-4 file-field">
                    <label class="form-label">Fichier</label>
                    <input type="file" name="file" class="form-control" required>
                    <div class="form-text selected-file">Aucun fichier selectionne</div>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Categorie</label>
                    <input type="text" name="categorie" class="form-control" placeholder="Contrat, bulletin, certificat...">
                </div>
                <div class="col-md-3" sec:authorize="hasAnyRole('ADMIN','RESPONSABLE_RH')">
                    <label class="form-label">Employe</label>
                    <select name="employeId" class="form-select">
                        <option value="">Non associe</option>
                        <option th:each="employe : ${employes}" th:value="${employe.id}" th:text="${employe.nomComplet}">Employe</option>
                    </select>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-accent w-100">Envoyer</button>
                </div>
            </form>
        </div>
    </div>

    <div class="panel">
        <form th:action="@{/documents}" method="get" class="filter-row">
            <input type="text" name="categorie" class="form-control" th:value="${categorieFiltre}" placeholder="Categorie" style="max-width: 240px;">
            <select name="employeId" class="form-select" style="max-width: 260px;">
                <option value="">Tous les employes</option>
                <option th:each="employe : ${employes}"
                        th:value="${employe.id}"
                        th:selected="${employeFiltre != null and employeFiltre == employe.id}"
                        th:text="${employe.nomComplet}">Employe</option>
            </select>
            <button class="btn btn-outline-primary" type="submit">Filtrer</button>
            <a th:href="@{/documents}" class="btn btn-light">Reinitialiser</a>
        </form>

        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th>Nom fichier</th>
                    <th>Categorie</th>
                    <th>Employe</th>
                    <th>Date ajout</th>
                    <th>Taille</th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="document : ${documents}">
                    <td class="fw-bold" th:text="${document.nomOriginal}">document.pdf</td>
                    <td th:text="${document.categorie ?: 'General'}">General</td>
                    <td th:text="${document.employe != null ? document.employe.nomComplet : '-'}">Employe</td>
                    <td th:text="${document.dateAjout ?: '-'}">-</td>
                    <td th:text="${document.taille != null ? document.taille + ' octets' : '-'}">-</td>
                    <td class="text-end">
                        <div class="d-inline-flex gap-1">
                            <a th:href="@{/documents/{id}/telecharger(id=${document.id})}" class="btn btn-sm btn-outline-primary btn-compact">
                                <i class="bi bi-download"></i>
                            </a>
                            <form th:action="@{/documents/{id}/supprimer(id=${document.id})}" method="post" class="confirm-delete">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="btn btn-sm btn-outline-danger btn-compact">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(documents)}">
                    <td colspan="6" class="empty-state">Aucun document.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
