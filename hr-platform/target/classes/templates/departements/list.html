<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Departements', ~{::section})}">
<body>
<section>
    <div class="panel">
        <div class="panel-header">
            <div>
                <h3>Organisation interne</h3>
                <p class="mb-0">Maintenez les departements, services et postes utilises par les fiches employes.</p>
            </div>
            <a th:href="@{/departements/nouveau}" class="btn btn-accent">
                <i class="bi bi-plus-lg me-2"></i>Nouveau departement
            </a>
        </div>

        <ul class="nav nav-tabs" id="orgTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="departements-tab" data-bs-toggle="tab" data-bs-target="#departements-pane" type="button" role="tab">Departements</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="services-tab" data-bs-toggle="tab" data-bs-target="#services-pane" type="button" role="tab">Services</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="postes-tab" data-bs-toggle="tab" data-bs-target="#postes-pane" type="button" role="tab">Postes</button>
            </li>
        </ul>

        <div class="tab-content pt-3">
            <div class="tab-pane fade show active" id="departements-pane" role="tabpanel" aria-labelledby="departements-tab">
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                        <tr><th>Libelle</th><th>Description</th><th class="text-end">Actions</th></tr>
                        </thead>
                        <tbody>
                        <tr th:each="departement : ${departements}">
                            <td class="fw-bold" th:text="${departement.libelle}">Departement</td>
                            <td th:text="${departement.description ?: '-'}">Description</td>
                            <td class="text-end">
                                <div class="d-inline-flex gap-1">
                                    <a th:href="@{/departements/{id}/modifier(id=${departement.id})}" class="btn btn-sm btn-outline-primary btn-compact">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <form th:action="@{/departements/{id}/supprimer(id=${departement.id})}" method="post" class="confirm-delete">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button type="submit" class="btn btn-sm btn-outline-danger btn-compact">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(departements)}"><td colspan="3" class="empty-state">Aucun departement.</td></tr>
                        </tbody>
                    </table>
                </div>
                <form th:action="@{/departements/sauvegarder}" th:object="${departementForm}" method="post" class="row g-2 mt-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="col-md-4">
                        <input type="text" class="form-control" th:field="*{libelle}" placeholder="Libelle" required>
                    </div>
                    <div class="col-md-6">
                        <input type="text" class="form-control" th:field="*{description}" placeholder="Description">
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-accent w-100" type="submit">Ajouter</button>
                    </div>
                </form>
            </div>

            <div class="tab-pane fade" id="services-pane" role="tabpanel" aria-labelledby="services-tab">
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                        <tr><th>Service</th></tr>
                        </thead>
                        <tbody>
                        <tr th:each="service : ${services}">
                            <td>
                                <form th:action="@{/services/sauvegarder}" method="post" class="row g-2 align-items-center">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <input type="hidden" name="id" th:value="${service.id}">
                                    <div class="col-lg-3">
                                        <input type="text" name="libelle" class="form-control" th:value="${service.libelle}" required>
                                    </div>
                                    <div class="col-lg-4">
                                        <input type="text" name="description" class="form-control" th:value="${service.description}" placeholder="Description">
                                    </div>
                                    <div class="col-lg-3">
                                        <select name="departement.id" class="form-select">
                                            <option value="">Sans departement</option>
                                            <option th:each="departement : ${departements}"
                                                    th:value="${departement.id}"
                                                    th:selected="${service.departement != null and service.departement.id == departement.id}"
                                                    th:text="${departement.libelle}">Departement</option>
                                        </select>
                                    </div>
                                    <div class="col-lg-2 d-flex gap-1 justify-content-end">
                                        <button class="btn btn-sm btn-outline-primary btn-compact" type="submit"><i class="bi bi-save"></i></button>
                                    </div>
                                </form>
                                <form th:action="@{/services/{id}/supprimer(id=${service.id})}" method="post" class="confirm-delete mt-2 text-end">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="btn btn-sm btn-outline-danger btn-compact" type="submit"><i class="bi bi-trash"></i></button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(services)}"><td class="empty-state">Aucun service.</td></tr>
                        </tbody>
                    </table>
                </div>
                <form th:action="@{/services/sauvegarder}" th:object="${serviceForm}" method="post" class="row g-2 mt-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="col-md-3">
                        <input type="text" class="form-control" th:field="*{libelle}" placeholder="Libelle" required>
                    </div>
                    <div class="col-md-4">
                        <input type="text" class="form-control" th:field="*{description}" placeholder="Description">
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" name="departement.id">
                            <option value="">Departement</option>
                            <option th:each="departement : ${departements}" th:value="${departement.id}" th:text="${departement.libelle}">Departement</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-accent w-100" type="submit">Ajouter</button>
                    </div>
                </form>
            </div>

            <div class="tab-pane fade" id="postes-pane" role="tabpanel" aria-labelledby="postes-tab">
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                        <tr><th>Poste</th></tr>
                        </thead>
                        <tbody>
                        <tr th:each="poste : ${postes}">
                            <td>
                                <form th:action="@{/postes/sauvegarder}" method="post" class="row g-2 align-items-center">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <input type="hidden" name="id" th:value="${poste.id}">
                                    <div class="col-lg-3">
                                        <input type="text" name="libelle" class="form-control" th:value="${poste.libelle}" required>
                                    </div>
                                    <div class="col-lg-4">
                                        <input type="text" name="description" class="form-control" th:value="${poste.description}" placeholder="Description">
                                    </div>
                                    <div class="col-lg-3">
                                        <input type="text" name="niveau" class="form-control" th:value="${poste.niveau}" placeholder="Niveau">
                                    </div>
                                    <div class="col-lg-2 text-end">
                                        <button class="btn btn-sm btn-outline-primary btn-compact" type="submit"><i class="bi bi-save"></i></button>
                                    </div>
                                </form>
                                <form th:action="@{/postes/{id}/supprimer(id=${poste.id})}" method="post" class="confirm-delete mt-2 text-end">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="btn btn-sm btn-outline-danger btn-compact" type="submit"><i class="bi bi-trash"></i></button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(postes)}"><td class="empty-state">Aucun poste.</td></tr>
                        </tbody>
                    </table>
                </div>
                <form th:action="@{/postes/sauvegarder}" th:object="${posteForm}" method="post" class="row g-2 mt-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="col-md-3">
                        <input type="text" class="form-control" th:field="*{libelle}" placeholder="Libelle" required>
                    </div>
                    <div class="col-md-4">
                        <input type="text" class="form-control" th:field="*{description}" placeholder="Description">
                    </div>
                    <div class="col-md-3">
                        <input type="text" class="form-control" th:field="*{niveau}" placeholder="Niveau">
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-accent w-100" type="submit">Ajouter</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
</body>
</html>
