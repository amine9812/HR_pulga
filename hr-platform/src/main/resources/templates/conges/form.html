<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Nouvelle demande de conge', ~{::section})}">
<body>
<section>
    <div class="form-panel">
        <div class="panel-header">
            <div>
                <h3>Soumettre une demande</h3>
                <p class="mb-0">Votre responsable recevra une notification apres l'envoi.</p>
            </div>
        </div>

        <form th:action="@{/conges/soumettre}" th:object="${demandeConge}" method="post" enctype="multipart/form-data" class="row g-3">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="col-md-4">
                <label class="form-label">Type de conge</label>
                <select class="form-select" th:field="*{type}" required>
                    <option value="">Selectionner</option>
                    <option th:each="type : ${types}" th:value="${type}" th:text="${type}">ANNUEL</option>
                </select>
                <div class="text-danger small" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></div>
            </div>
            <div class="col-md-4">
                <label class="form-label">Date debut</label>
                <input type="date" class="form-control" id="dateDebut" th:field="*{dateDebut}" required>
                <div class="text-danger small" th:if="${#fields.hasErrors('dateDebut')}" th:errors="*{dateDebut}"></div>
            </div>
            <div class="col-md-4">
                <label class="form-label">Date fin</label>
                <input type="date" class="form-control" id="dateFin" th:field="*{dateFin}" required>
                <div class="text-danger small" th:if="${#fields.hasErrors('dateFin')}" th:errors="*{dateFin}"></div>
            </div>
            <div class="col-md-4">
                <label class="form-label">Nombre de jours</label>
                <div class="form-control bg-light" id="nombreJours">0 jour(s)</div>
            </div>
            <div class="col-md-8 file-field">
                <label class="form-label">Justificatif</label>
                <input type="file" name="justificatif" class="form-control">
                <div class="form-text selected-file">Aucun fichier selectionne</div>
            </div>
            <div class="col-12">
                <label class="form-label">Motif</label>
                <textarea class="form-control" rows="4" th:field="*{motif}" placeholder="Precisez le motif si necessaire"></textarea>
            </div>
            <div class="col-12 d-flex justify-content-end gap-2">
                <a th:href="@{/conges}" class="btn btn-light">Annuler</a>
                <button type="submit" class="btn btn-accent">
                    <i class="bi bi-send me-2"></i>Soumettre
                </button>
            </div>
        </form>
    </div>
</section>
</body>
</html>
