<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout('Conges & Absences', ~{::section})}">
<body>
<section>
    <div class="panel">
        <div class="panel-header">
            <div>
                <h3>Demandes de conge</h3>
                <p class="mb-0">Suivi des demandes selon votre role et votre perimetre.</p>
            </div>
            <a th:href="@{/conges/nouveau}" class="btn btn-accent">
                <i class="bi bi-plus-lg me-2"></i>Nouvelle demande
            </a>
        </div>

        <form th:action="@{/conges}" method="get" class="filter-row">
            <select class="form-select" name="statut" style="max-width: 220px;">
                <option value="">Tous les statuts</option>
                <option th:each="statut : ${statuts}" th:value="${statut}" th:selected="${statutFiltre == statut}" th:text="${statut}">Statut</option>
            </select>
            <select class="form-select" name="type" style="max-width: 220px;">
                <option value="">Tous les types</option>
                <option th:each="type : ${types}" th:value="${type}" th:selected="${typeFiltre == type}" th:text="${type}">Type</option>
            </select>
            <button type="submit" class="btn btn-outline-primary">Filtrer</button>
            <a th:href="@{/conges}" class="btn btn-light">Reinitialiser</a>
        </form>

        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th>Employe</th>
                    <th>Type</th>
                    <th>Du</th>
                    <th>Au</th>
                    <th>Motif</th>
                    <th>Statut</th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="demande : ${demandes}">
                    <td th:text="${demande.employe != null ? demande.employe.nomComplet : '-'}">Employe</td>
                    <td th:text="${demande.type}">ANNUEL</td>
                    <td th:text="${demande.dateDebut}">-</td>
                    <td th:text="${demande.dateFin}">-</td>
                    <td th:text="${demande.motif ?: '-'}">Motif</td>
                    <td><span th:class="'status-badge status-' + ${demande.statut}" th:text="${demande.statut}">EN_ATTENTE</span></td>
                    <td class="text-end">
                        <div class="d-flex flex-column flex-xl-row justify-content-end gap-1">
                            <form th:if="${demande.statut.name() == 'EN_ATTENTE'
                                      and utilisateurConnecte != null
                                      and utilisateurConnecte.employe != null
                                      and demande.employe != null
                                      and demande.employe.id == utilisateurConnecte.employe.id}"
                                  th:action="@{/conges/{id}/annuler(id=${demande.id})}" method="post" class="confirm-delete">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="btn btn-sm btn-outline-secondary btn-compact">
                                    <i class="bi bi-x-circle"></i><span>Annuler</span>
                                </button>
                            </form>
                            <form th:if="${demande.statut.name() == 'EN_ATTENTE'}"
                                  th:action="@{/conges/{id}/valider(id=${demande.id})}" method="post"
                                  class="d-flex gap-1 justify-content-end"
                                  sec:authorize="hasAnyRole('RESPONSABLE_HIERARCHIQUE','RESPONSABLE_RH','ADMIN')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="text" name="commentaire" class="form-control form-control-sm" placeholder="Commentaire" style="max-width: 160px;">
                                <button type="submit" class="btn btn-sm btn-success btn-compact">
                                    <i class="bi bi-check-lg"></i>
                                </button>
                            </form>
                            <form th:if="${demande.statut.name() == 'EN_ATTENTE'}"
                                  th:action="@{/conges/{id}/refuser(id=${demande.id})}" method="post"
                                  class="d-flex gap-1 justify-content-end"
                                  sec:authorize="hasAnyRole('RESPONSABLE_HIERARCHIQUE','RESPONSABLE_RH','ADMIN')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="text" name="commentaire" class="form-control form-control-sm" placeholder="Motif refus" style="max-width: 160px;">
                                <button type="submit" class="btn btn-sm btn-danger btn-compact">
                                    <i class="bi bi-x-lg"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(demandes)}">
                    <td colspan="7" class="empty-state">Aucune demande de conge.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
