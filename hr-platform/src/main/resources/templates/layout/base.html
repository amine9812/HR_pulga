<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(pageTitle, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle} + ' - RH Plateforme'">RH Plateforme</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<aside id="sidebar">
    <div class="sidebar-brand">
        <div class="brand-mark"><i class="bi bi-grid-1x2-fill"></i></div>
        <div>
            <div class="brand-title">RH Plateforme</div>
            <div class="brand-subtitle">Gestion interne</div>
        </div>
    </div>

    <nav class="sidebar-nav">
        <a th:href="@{/dashboard}" class="nav-link" data-route="/dashboard">
            <i class="bi bi-speedometer2"></i><span>Tableau de bord</span>
        </a>
        <a th:href="@{/employes}" class="nav-link" data-route="/employes" sec:authorize="!hasRole('EMPLOYE')">
            <i class="bi bi-people"></i><span>Employes</span>
        </a>
        <a th:href="@{/departements}" class="nav-link" data-route="/departements" sec:authorize="hasAnyRole('ADMIN','RESPONSABLE_RH')">
            <i class="bi bi-diagram-3"></i><span>Departements</span>
        </a>
        <a th:href="@{/conges}" class="nav-link" data-route="/conges">
            <i class="bi bi-calendar2-week"></i><span>Conges & Absences</span>
        </a>
        <a th:href="@{/demandes}" class="nav-link" data-route="/demandes">
            <i class="bi bi-file-earmark-text"></i><span>Demandes Admin</span>
        </a>
        <a th:href="@{/documents}" class="nav-link" data-route="/documents">
            <i class="bi bi-folder2-open"></i><span>Documents</span>
        </a>
        <a th:href="@{/notifications}" class="nav-link nav-link-with-badge" data-route="/notifications">
            <i class="bi bi-bell"></i><span>Notifications</span>
            <span th:if="${notificationsNonLues != null and notificationsNonLues > 0}"
                  class="badge rounded-pill bg-danger ms-auto"
                  th:text="${notificationsNonLues}">0</span>
        </a>
        <a th:href="@{/admin}" class="nav-link" data-route="/admin" sec:authorize="hasRole('ADMIN')">
            <i class="bi bi-shield-lock"></i><span>Administration</span>
        </a>
    </nav>

    <div class="sidebar-user">
        <div class="user-avatar">
            <span th:text="${utilisateurConnecte != null and utilisateurConnecte.employe != null ? #strings.substring(utilisateurConnecte.employe.prenom,0,1) : 'U'}">U</span>
        </div>
        <div class="user-meta">
            <div class="user-name"
                 th:text="${utilisateurConnecte != null and utilisateurConnecte.employe != null ? utilisateurConnecte.employe.nomComplet : 'Utilisateur'}">Utilisateur</div>
            <div class="user-role" th:text="${utilisateurConnecte != null ? utilisateurConnecte.role : ''}">ROLE</div>
        </div>
        <form th:action="@{/logout}" method="post" class="ms-auto">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn btn-logout" title="Se deconnecter">
                <i class="bi bi-box-arrow-right"></i>
            </button>
        </form>
    </div>
</aside>

<main id="main-content">
    <nav class="top-bar">
        <button class="btn icon-btn d-md-none" id="sidebarToggle" type="button" title="Menu">
            <i class="bi bi-list"></i>
        </button>
        <div>
            <h1 th:text="${pageTitle}">Page</h1>
            <div class="breadcrumb-line">
                <a th:href="@{/dashboard}">Accueil</a>
                <i class="bi bi-chevron-right"></i>
                <span th:text="${pageTitle}">Page</span>
            </div>
        </div>
        <div class="top-actions">
            <a th:href="@{/notifications}" class="btn icon-btn position-relative" title="Notifications">
                <i class="bi bi-bell"></i>
                <span th:if="${notificationsNonLues != null and notificationsNonLues > 0}"
                      class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                      th:text="${notificationsNonLues}">0</span>
            </a>
        </div>
    </nav>

    <div class="content-wrapper">
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show flash-message" role="alert">
            <i class="bi bi-check-circle me-2"></i><span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fermer"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show flash-message" role="alert">
            <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fermer"></button>
        </div>
        <th:block th:replace="${content}"></th:block>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
